<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You | RAKEZ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="page-shell confirmation-shell">
        <section class="confirmation-card" aria-labelledby="thank-you-title">
            <div class="success-icon" aria-hidden="true">
                <span>✓</span>
            </div>
            <p class="eyebrow">Inquiry Submitted</p>
            <h1 id="thank-you-title">Thank you for your inquiry.</h1>
            <p class="subtitle">Our sales team has received your details and will reach out to you soon. Check your email for more information. You may need to check the spam folder.</p>
            <a class="submit-button link-button" href="index.html">Submit another inquiry</a>
        </section>
    </main>
</body>
</html>
